<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade - CSV Analysis</title>
    <style>
        :root {
            --bg-deep: #121214;
            --bg-surface: #1e1e20;
            --bg-input: #2a2a2d;
            --text-main: #dcdcb1; /* Beige main text */
            --text-dim: #a0a095; /* Muted beige secondary text */
            --border-ui: #323235;
            --accent-ui: #404045;
            --radius: 6px;
        }
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 380px;
            width: 90%;
            background-color: var(--bg-surface);
            padding: 3rem;
            border-radius: var(--radius);
            border: 1px solid var(--border-ui);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        h2 { 
            font-size: 1.4rem; 
            font-weight: 500; 
            margin-bottom: 1rem; 
            text-align: center;
            letter-spacing: -0.01em;
        }
        p {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .form-group { margin-bottom: 1.5rem; }
        label { 
            display: block; 
            margin-bottom: 0.5rem; 
            font-size: 0.75rem; 
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        select, input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-ui);
            border-radius: var(--radius);
            box-sizing: border-box;
            font-size: 0.95rem;
            background: var(--bg-input);
            color: var(--text-main);
        }
        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--accent-ui);
            color: var(--text-main);
            border: 1px solid var(--border-ui);
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.95rem;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        button:hover { background-color: #4a4a50; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-decoration: none;
        }
        .back-link:hover { color: var(--text-main); }
    </style>
</head>
<body>
    <div class="container">
        <h2>Upgrade to Pro</h2>
        <p>Unlock unlimited CSV analysis and priority processing for just ₹100/month.</p>
        
        <div class="form-group">
            <label>Payment Method</label>
            <select id="payment-type">
                <option value="upi">UPI Transfer</option>
                <option value="debit">Card Payment</option>
            </select>
        </div>
        
        <div class="form-group">
            <label id="details-label">Identifier</label>
            <input type="text" id="details" placeholder="e.g. user@upi">
        </div>
        
        <button id="purchase-btn">Complete Payment</button>
        <a href="index.html" class="back-link">Return to Dashboard</a>
    </div>

    <script>
        const purchaseBtn = document.getElementById('purchase-btn');
        const paymentType = document.getElementById('payment-type');
        const detailsInput = document.getElementById('details');
        const user = JSON.parse(localStorage.getItem('user'));

        if (!user) {
            window.location.href = 'login.html';
        }

        paymentType.addEventListener('change', () => {
            detailsInput.placeholder = paymentType.value === 'upi' ? 'e.g. user@upi' : '0000 0000 0000 0000';
        });

        purchaseBtn.addEventListener('click', async () => {
            const details = detailsInput.value;

            if (!details) {
                alert('Please enter payment details');
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:8000/api/purchase-pro/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.user_id,
                        payment_type: paymentType.value,
                        details: details
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Upgrade successful!');
                    user.is_pro = true;
                    localStorage.setItem('user', JSON.stringify(user));
                    window.location.href = 'index.html';
                } else {
                    alert(data.error || 'Something went wrong');
                }
            } catch (error) {
                alert('Backend connection error');
            }
        });
    </script>
</body>
</html>
